name: ml-experiment-triage
version: "1.0.0"
description: >
  An RL environment where an AI agent triages ML experiment results.
  The agent must identify best runs, detect overfitting, and suggest
  next hyperparameter configurations.
tags:
  - openenv
  - machine-learning
  - data-science
  - experiment-management
  - reinforcement-learning
tasks:
  - id: 1
    name: find_best_experiment
    difficulty: easy
    max_steps: 10
    description: "Find and identify the best performing experiment"
  - id: 2
    name: identify_overfitting
    difficulty: medium
    max_steps: 15
    description: "Detect and discard all overfitting experiments"
  - id: 3
    name: suggest_next_experiment
    difficulty: hard
    max_steps: 20
    description: "Analyze incomplete results and suggest next config"
action_space:
  type: discrete
  actions:
    - name: investigate
      description: "Examine an experiment in detail"
      params: [exp_id]
    - name: discard
      description: "Mark experiment as a dead end"
      params: [exp_id]
    - name: suggest
      description: "Propose next hyperparameter configuration"
      params: [suggestion]
    - name: summarize
      description: "Give final answer and end episode"
      params: [summary]
observation_space:
  type: structured
  fields:
    - name: experiments
      type: "List[ExperimentRecord]"
    - name: current_step
      type: int
    - name: max_steps
      type: int
    - name: task_description
      type: str
    - name: feedback
      type: str
reward:
  range: [0.0, 1.0]
  type: dense
  description: "Partial rewards per step, final score on summarize"
